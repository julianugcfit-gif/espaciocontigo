<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Espacio Contigo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-box { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; }
    .logo { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .logo span { color: #1D9E75; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; margin-top: 12px; }
    input { width: 100%; padding: 12px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #f0f0f0; font-size: 15px; font-family: inherit; outline: none; -webkit-appearance: none; }
    input:focus { border-color: #1D9E75; }
    .btn { width: 100%; padding: 13px; background: #1D9E75; border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1.25rem; font-family: inherit; }
    .btn:active { background: #0F6E56; }
    .err { color: #ff6b6b; font-size: 13px; margin-top: 10px; display: none; padding: 8px 12px; background: #2a1010; border-radius: 8px; }
    .loading { color: #1D9E75; font-size: 13px; margin-top: 10px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    .topbar { background: #1a1a1a; border-bottom: 1px solid #333; padding: 0 1rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-logo { font-size: 15px; font-weight: 600; }
    .topbar-logo span { color: #1D9E75; }
    .logout { font-size: 12px; color: #888; background: none; border: 1px solid #333; border-radius: 8px; padding: 5px 10px; cursor: pointer; color: #f0f0f0; font-family: inherit; }
    .content { padding: 1rem; max-width: 600px; margin: 0 auto; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .metric { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1rem; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    .metric-val { font-size: 26px; font-weight: 600; }
    .metric-val.red { color: #ff6b6b; }
    .metric-val.green { color: #1D9E75; }
    .alert-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1rem; margin-bottom: 10px; border-left: 3px solid #ff6b6b; }
    .alert-card.ok { border-left-color: #1D9E75; }
    .alert-session { font-size: 12px; color: #888; margin-bottom: 4px; }
    .alert-text { font-size: 14px; color: #f0f0f0; margin-bottom: 8px; }
    .alert-time { font-size: 11px; color: #666; }
    .contact-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .contact-info { flex: 1; }
    .contact-name { font-size: 14px; font-weight: 500; }
    .contact-wa { font-size: 13px; color: #1D9E75; margin-top: 2px; }
    .wa-link { background: #25D366; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; text-decoration: none; white-space: nowrap; }
    .empty { text-align: center; padding: 2rem; color: #555; font-size: 13px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 4px; }
    .tab { padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #333; background: #1a1a1a; color: #888; white-space: nowrap; font-family: inherit; }
    .tab.active { background: #1D9E75; border-color: #1D9E75; color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .refresh-btn { font-size: 12px; color: #1D9E75; background: none; border: 1px solid #1D9E75; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; float: right; margin-top: -2px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="logo">Espacio <span>Contigo</span></div>
    <div class="sub">Panel de administrador</div>
    <label>Correo electrónico</label>
    <input type="email" id="email" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="tu@correo.com" />
    <label>Contraseña</label>
    <input type="password" id="pass" autocomplete="off" placeholder="••••••••" />
    <button class="btn" onclick="login()">Ingresar</button>
    <div class="err" id="err-msg">Correo o contraseña incorrectos.</div>
    <div class="loading" id="loading-msg">Verificando...</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">Espacio <span>Contigo</span></div>
    <button class="logout" onclick="logout()">Salir</button>
  </div>
  <div class="content">
    <div class="section-title">Resumen</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Sesiones hoy</div><div class="metric-val green" id="m-sesiones">—</div></div>
      <div class="metric"><div class="metric-label">Crisis detectadas</div><div class="metric-val red" id="m-crisis">—</div></div>
      <div class="metric"><div class="metric-label">Ánimo promedio</div><div class="metric-val" id="m-animo">—</div></div>
      <div class="metric"><div class="metric-label">Contactos WhatsApp</div><div class="metric-val green" id="m-contactos">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('alertas',this)">🚨 Alertas</button>
      <button class="tab" onclick="showTab('contactos',this)">📱 WhatsApp</button>
      <button class="tab" onclick="showTab('mensajes',this)">💬 Mensajes</button>
    </div>

    <div class="panel active" id="tab-alertas">
      <div class="section-title" style="font-size:15px">Alertas de crisis <button class="refresh-btn" onclick="loadAlertas()">↻ Actualizar</button></div>
      <div id="alertas-list"><div class="empty">Cargando...</div></div>
    </div>

    <div class="panel" id="tab-contactos">
      <div class="section-title" style="font-size:15px">Solicitudes WhatsApp <button class="refresh-btn" onclick="loadContactos()">↻ Actualizar</button></div>
      <div id="contactos-list"><div class="empty">Cargando...</div></div>
    </div>

    <div class="panel" id="tab-mensajes">
      <div class="section-title" style="font-size:15px">Mensajes recientes <button class="refresh-btn" onclick="loadMensajes()">↻ Actualizar</button></div>
      <div id="mensajes-list"><div class="empty">Cargando...</div></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, limit, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

const hoy = () => new Date().toLocaleDateString('es-VE');
const fmtRel = ts => {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime()) / 60000);
  if (diff < 1) return 'ahora';
  if (diff < 60) return `hace ${diff}m`;
  return `hace ${Math.floor(diff/60)}h`;
};

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
    loadAll();
  } else {
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('dashboard').style.display  = 'none';
  }
});

window.login = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const err   = document.getElementById('err-msg');
  const load  = document.getElementById('loading-msg');
  err.style.display  = 'none';
  load.style.display = 'block';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    load.style.display = 'none';
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  }
};

window.logout = () => signOut(auth);

window.showTab = (name, el) => {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
};

function loadAll() { loadResumen(); loadAlertas(); loadContactos(); loadMensajes(); }

async function loadResumen() {
  try {
    const snap = await getDocs(query(collection(db,'evaluaciones'), where('fecha','==',hoy())));
    const sessions = new Set();
    let sum = 0, count = 0;
    snap.forEach(d => { const v=d.data(); sessions.add(v.sessionId); if(v.mood){sum+=v.mood;count++;} });
    document.getElementById('m-sesiones').textContent = sessions.size || '0';
    document.getElementById('m-animo').textContent = count ? (sum/count).toFixed(1) : '—';
    const cs = await getDocs(query(collection(db,'alertas'), where('atendida','==',false)));
    document.getElementById('m-crisis').textContent = cs.size;
    const ct = await getDocs(collection(db,'contactos'));
    document.getElementById('m-contactos').textContent = ct.size;
  } catch(e) { console.log(e); }
}

window.loadAlertas = async () => {
  const list = document.getElementById('alertas-list');
  list.innerHTML = '<div class="empty">Cargando...</div>';
  try {
    const snap = await getDocs(query(collection(db,'alertas'), orderBy('timestamp','desc'), limit(30)));
    if (!snap.size) { list.innerHTML = '<div class="empty">Sin alertas. ¡Todo tranquilo!</div>'; return; }
    list.innerHTML = snap.docs.map(d => {
      const v = d.data();
      return `<div class="alert-card ${v.atendida?'ok':''}">
        <div class="alert-session">Sesión ...${(v.sessionId||'').slice(-8)} · ${fmtRel(v.timestamp)}</div>
        <div class="alert-text">"${v.texto||'Sin texto'}"</div>
        <div class="alert-time">${v.atendida ? '✅ Atendida' : '🔴 Sin atender'} · Nivel: ${v.nivel||'crisis'}</div>
      </div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; }
};

window.loadContactos = async () => {
  const list = document.getElementById('contactos-list');
  list.innerHTML = '<div class="empty">Cargando...</div>';
  try {
    const snap = await getDocs(query(collection(db,'contactos'), orderBy('timestamp','desc'), limit(30)));
    if (!snap.size) { list.innerHTML = '<div class="empty">Sin solicitudes aún.</div>'; return; }
    list.innerHTML = snap.docs.map(d => {
      const v = d.data();
      const wa = (v.whatsapp||'').replace(/[^0-9]/g,'').replace(/^0/,'');
      return `<div class="contact-card">
        <div class="contact-info">
          <div class="contact-name">${v.alias||'Anónimo'}</div>
          <div class="contact-wa">${v.whatsapp||'Sin número'}</div>
          <div class="alert-time">${fmtRel(v.timestamp)}</div>
        </div>
        ${wa ? `<a class="wa-link" href="https://wa.me/58${wa}" target="_blank">WhatsApp</a>` : ''}
      </div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; }
};

window.loadMensajes = async () => {
  const list = document.getElementById('mensajes-list');
  list.innerHTML = '<div class="empty">Cargando...</div>';
  try {
    const snap = await getDocs(query(collection(db,'mensajes'), where('sender','==','user'), orderBy('timestamp','desc'), limit(30)));
    if (!snap.size) { list.innerHTML = '<div class="empty">Sin mensajes aún.</div>'; return; }
    list.innerHTML = snap.docs.map(d => {
      const v = d.data();
      return `<div class="alert-card ok">
        <div class="alert-session">Sesión ...${(v.sessionId||'').slice(-8)} · ${fmtRel(v.timestamp)}</div>
        <div class="alert-text">"${(v.text||'').slice(0,120)}"</div>
        <div class="alert-time">Tema: ${v.theme||'general'} ${v.isCrisis?'🔴 CRISIS':''}</div>
      </div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; }
};
</script>
</body>
</html>
